<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Tracker</title>
<script src='https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js'></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<style>
body{margin:0;overflow:hidden;background:#000;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;color:#fff;touch-action:none}
#ui-panel{position:absolute;top:20px;left:20px;background:rgba(15,15,20,0.75);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);padding:20px;border-radius:12px;width:260px;z-index:10;box-shadow:0 8px 32px rgba(0,0,0,0.8);box-sizing:border-box}
h2{margin-top:0;font-size:15px;color:#eee;margin-bottom:15px;text-align:center;text-transform:uppercase;letter-spacing:2px;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:10px}
.input-group{margin-bottom:12px}label{display:block;font-size:11px;color:#aaa;margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:1px}
input[type=range]{width:100%;cursor:pointer;box-sizing:border-box;accent-color:#00ffcc}
.checkbox-group{display:flex;align-items:center;gap:10px;margin-bottom:12px;background:rgba(255,255,255,0.05);padding:10px;border-radius:6px;border:1px solid rgba(255,255,255,0.05)}
.checkbox-group label{margin:0;cursor:pointer;color:#ddd;font-size:12px}
.checkbox-group input{margin:0;cursor:pointer;width:16px;height:16px;accent-color:#00ffcc}
.links-container{border-top:1px solid rgba(255,255,255,0.1);margin-top:15px;padding-top:10px;display:flex;flex-direction:column;gap:10px}
.social-link{display:block;width:100%;box-sizing:border-box;padding:12px;text-align:center;color:#fff;text-decoration:none;font-weight:bold;font-size:11px;text-transform:uppercase;letter-spacing:1px;border-radius:6px;transition:all 0.2s ease;box-shadow:0 4px 10px rgba(0,0,0,0.3)}
.social-link:hover{transform:translateY(-2px);box-shadow:0 6px 15px rgba(0,0,0,0.5)}
.social-link.stream{background:linear-gradient(135deg,#ff0000,#cc0000)}
.social-link.discord{background:linear-gradient(135deg,#5865F2,#4752C4)}
#loading-screen{position:absolute;top:0;left:0;width:100%;height:100%;background:#050505;color:#00ffcc;display:flex;align-items:center;justify-content:center;z-index:100;font-family:'Courier New',monospace;font-size:18px;letter-spacing:2px;transition:opacity 0.8s}
@media(max-width:600px){
#ui-panel{top:15px;left:50%;transform:translateX(-50%);width:92%;max-width:400px;padding:15px}
.links-container{flex-direction:row}
.social-link{padding:10px 5px;font-size:9px}
}
</style>
</head>
<body>
<div id="loading-screen">ESTABLISHING UPLINK...</div>
<div id="ui-panel">
<h2>Live Tracking</h2>
<div class="checkbox-group"><input type="checkbox" id="gps-mode" checked><label>Auto-Chase Camera</label></div>
<div class="input-group"><label>Camera Distance</label><input type="range" id="zoom" min="0.5" max="10" step="0.1" value="3.5"></div>
<div class="links-container">
<a href="https://www.youtube.com/@nolopada" target="_blank" class="social-link stream">Watch Live</a>
<a href="https://discord.gg/VDshJWRjx3" target="_blank" class="social-link discord">Brolo Republic Discord</a>
</div>
</div>
<script>
const START_TIME_B64 = "MTc3MjkxMzkzMg==";
const scene=new THREE.Scene();const camera=new THREE.PerspectiveCamera(45,window.innerWidth/window.innerHeight,0.1,1000)
camera.position.z=15;const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true})
renderer.setClearColor(0x020202,1);renderer.setSize(window.innerWidth,window.innerHeight);document.body.appendChild(renderer.domElement)
const controls=new THREE.OrbitControls(camera,renderer.domElement);controls.enableDamping=true;controls.dampingFactor=0.05;controls.maxDistance=20;controls.minDistance=5.5
const R=5;const globeMat=new THREE.MeshPhongMaterial({color:0x222222,shininess:5})
const globeMesh=new THREE.Mesh(new THREE.SphereGeometry(R,64,64),globeMat);globeMesh.rotation.y=-Math.PI/2
scene.add(globeMesh);scene.add(new THREE.AmbientLight(0xffffff,0.6));const dirLight=new THREE.DirectionalLight(0xffffff,0.8)
dirLight.position.set(10,10,10);scene.add(dirLight)
let waypointsData=[];let fullPathPoints=[];let pathLine=null;let pathCurve=null;let arrow=null;
let isAnimating=false;let currentPlaybackTime=0
let _st=parseInt(atob(START_TIME_B64)),_rt=0;
window.onload=function(){
new THREE.TextureLoader().load('map.png',function(t){globeMat.map=t;globeMat.color.setHex(0xffffff);globeMat.needsUpdate=true},undefined,function(e){})
Promise.all([fetch(window.location.href,{cache:"no-store",method:"HEAD"}).then(r=>Math.floor(new Date(r.headers.get("Date")).getTime()/1000)),fetch("map_data_v2.txt",{cache:"no-store"}).then(r=>{if(!r.ok)throw 1;return r.text()})]).then(d=>{
let nx=d[0];if(nx-_st>2592000||nx<_st)throw 1;
_rt=nx-(performance.now()/1000);let c=d[1]
if(!c.trim().startsWith("[")){try{c=decodeURIComponent(escape(atob(c.trim())))}catch(e){}}
JSON.parse(c).forEach(p=>{if(p.lat!==undefined)addWaypoint(p.lat,p.lon,p.time)})
rebuildPath();const ls=document.getElementById("loading-screen");ls.style.opacity="0";setTimeout(()=>{ls.style.display="none";if(waypointsData.length>=2){isAnimating=true;}},800)
}).catch(e=>{document.getElementById("loading-screen").innerText="UPLINK FAILED / OFFLINE"})};
function addWaypoint(lat,lon,t){
const phi=lat*(Math.PI/180);const theta=lon*(Math.PI/180);const y=R*Math.sin(phi);const xr=R*Math.cos(phi)
const cp=new THREE.Vector3(xr*Math.sin(theta),y,xr*Math.cos(theta))
waypointsData.push({lat:lat,lon:lon,pos:cp,time:t});waypointsData.sort((a,b)=>a.time-b.time)}
function rebuildPath(){
if(pathLine){scene.remove(pathLine);pathLine.geometry.dispose();pathLine.material.dispose()}
if(waypointsData.length<2)return;const v=waypointsData.map(w=>w.pos);pathCurve=new THREE.CatmullRomCurve3(v)
fullPathPoints=[];for(let i=0;i<=2000;i++){fullPathPoints.push(pathCurve.getPoint(i/2000).normalize().multiplyScalar(R+0.05))}
const lg=new THREE.BufferGeometry().setFromPoints(fullPathPoints);lg.setDrawRange(0,0)
pathLine=new THREE.Line(lg,new THREE.LineBasicMaterial({color:0xffcc00,linewidth:2,transparent:true,opacity:0.8}));scene.add(pathLine)
if(!arrow){const ag=new THREE.ConeGeometry(0.15,0.4,16);ag.rotateX(Math.PI/2);arrow=new THREE.Mesh(ag,new THREE.MeshBasicMaterial({color:0x00ffcc}));scene.add(arrow)}}
function updateSceneObjects(){
if(waypointsData.length<2||!pathCurve||!arrow)return;const mt=waypointsData[waypointsData.length-1].time;let pr=0
if(currentPlaybackTime>=mt){pr=1;isAnimating=false;}else{
for(let i=0;i<waypointsData.length-1;i++){const t1=waypointsData[i].time;const t2=waypointsData[i+1].time;
if(currentPlaybackTime>=t1&&currentPlaybackTime<=t2){let lp=0;if(t2-t1>0)lp=(currentPlaybackTime-t1)/(t2-t1);pr=(i+lp)/(waypointsData.length-1);break}}
}
const cp=pathCurve.getPoint(pr).normalize().multiplyScalar(R+0.05);let fd=new THREE.Vector3(0,0,0)
if(pr<0.999){const np=pathCurve.getPoint(pr+0.001).normalize().multiplyScalar(R+0.05);fd.subVectors(np,cp).normalize();arrow.position.copy(cp);arrow.lookAt(np)}else{arrow.visible=false}
if(pathLine){const ti=Math.floor(pr*(fullPathPoints.length-1));pathLine.geometry.setDrawRange(0,ti+1)}
if(document.getElementById('gps-mode').checked&&pr<0.999){controls.enabled=false;const un=cp.clone().normalize();const zl=parseFloat(document.getElementById('zoom').value)||3.5
const tc=cp.clone().addScaledVector(un,zl).addScaledVector(fd,-(zl*0.28));camera.position.lerp(tc,0.05);camera.up.lerp(un,0.05);camera.lookAt(cp)
}else if(!controls.enabled)controls.enabled=true}
function animate(){requestAnimationFrame(animate);controls.update()
if(isAnimating&&waypointsData.length>1&&pathCurve){currentPlaybackTime=(_rt+(performance.now()/1000))-_st;updateSceneObjects()}
else if(!isAnimating){controls.enabled=true;camera.up.lerp(new THREE.Vector3(0,1,0),0.05)}renderer.render(scene,camera)}
animate();window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight)})
</script>
</body>
</html>
